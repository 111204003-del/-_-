    // ---------- 最短路徑 (Dijkstra) ----------
    let graph = new Map();
    function buildGraph() {
        graph.clear();
        const addEdge = (a,b,w) => { if(!graph.has(a)) graph.set(a,[]); if(!graph.has(b)) graph.set(b,[]); graph.get(a).push({node:b,weight:w}); graph.get(b).push({node:a,weight:w}); };
        Object.values(mrtLines).forEach(line => {
            for(let i=0;i<line.stations.length-1;i++) {
                let s1=line.stations[i], s2=line.stations[i+1];
                if(coords[s1] && coords[s2]) {
                    let dx = coords[s1][0]-coords[s2][0], dy = coords[s1][1]-coords[s2][1];
                    let km = Math.sqrt(dx*dx+dy*dy)*0.16;
                    if(km<0.3) km=0.5;
                    addEdge(s1,s2,km);
                }
            }
        });
    }
    function dijkstra(start,end) {
        if(!graph.has(start)||!graph.has(end)) return Infinity;
        let dist=new Map(), pq=[{node:start,val:0}];
        for(let n of graph.keys()) dist.set(n,Infinity);
        dist.set(start,0);
        while(pq.length){
            pq.sort((a,b)=>a.val-b.val);
            let {node:cur,val:curD}=pq.shift();
            if(cur===end) break;
            if(curD>dist.get(cur)) continue;
            for(let nb of graph.get(cur)){
                let nd=curD+nb.weight;
                if(nd<dist.get(nb.node)){ dist.set(nb.node,nd); pq.push({node:nb.node,val:nd}); }
            }
        }
        return dist.get(end);
    }

    let currentLang = 'zh';
    const i18n = {
        zh: { mapTitle:"台北捷運路線圖", mapSub:"🖱️ 左鍵起點 · 右鍵終點", stationTitle:"📍 站點設定", startLabel:"🚉 起站", destLabel:"🏁 迄站", lineDefault:"-- 依路線篩選目的地 --", destPlaceholder:"-- 請先選路線 --", fareTitle:"💰 票價 & 乘車資訊", fullLabel:"全票票價", discLabel:"優待票價", timeLabel:"預估乘車時間", detailTitle:"📐 路徑詳情", distTh:"實際路線距離", distUnit:"公里", startTh:"起點站", destTh:"終點站", footer:"💡 點擊地圖圓點：左鍵起點／右鍵終點 | 自動最短路徑", startEmpty:"未選擇", destEmpty:"未選擇" },
        en: { mapTitle:"Taipei MRT Map", mapSub:"🖱️ Left: Origin · Right: Destination", stationTitle:"📍 Station Settings", startLabel:"🚉 Origin", destLabel:"🏁 Destination", lineDefault:"-- Filter by Line --", destPlaceholder:"-- Select Station --", fareTitle:"💰 Fare & Travel Time", fullLabel:"Standard Fare", discLabel:"Concession Fare", timeLabel:"Est. Travel Time", detailTitle:"📐 Route Details", distTh:"Distance", distUnit:"km", startTh:"Origin", destTh:"Destination", footer:"💡 Click dot: Left=Origin / Right=Destination · Shortest path", startEmpty:"Not set", destEmpty:"Not set" }
    };
    function applyLanguage() {
        let t = i18n[currentLang];
        document.getElementById("map-title").innerText = t.mapTitle;
        document.getElementById("map-sub").innerText = t.mapSub;
        document.getElementById("station-title").innerText = t.stationTitle;
        document.getElementById("start-label").innerHTML = t.startLabel;
        document.getElementById("dest-label").innerHTML = t.destLabel;
        document.getElementById("line-default").innerText = t.lineDefault;
        document.getElementById("dest-placeholder").innerText = t.destPlaceholder;
        document.getElementById("fare-title").innerText = t.fareTitle;
        document.getElementById("full-label").innerText = t.fullLabel;
        document.getElementById("disc-label").innerText = t.discLabel;
        document.getElementById("time-label").innerText = t.timeLabel;
        document.getElementById("detail-title").innerText = t.detailTitle;
        document.getElementById("dist-th").innerText = t.distTh;
        document.getElementById("dist-unit").innerText = t.distUnit;
        document.getElementById("start-th").innerText = t.startTh;
        document.getElementById("dest-th").innerText = t.destTh;
        document.getElementById("footer-text").innerText = t.footer;
        // 更新線路下拉選單
        let lineOpts = document.querySelectorAll("#line-select option");
        if(lineOpts.length>1){
            if(currentLang==='en'){
                lineOpts[1].innerText="BL: Banqiao-Nangang Line"; lineOpts[2].innerText="R: Tamsui-Xinyi Line";
                lineOpts[3].innerText="G: Songshan-Xindian Line"; lineOpts[4].innerText="O: Zhonghe-Xinlu Line";
                lineOpts[5].innerText="BR: Wenhu Line"; lineOpts[6].innerText="Y: Circular Line";
            } else {
                lineOpts[1].innerText="板南線"; lineOpts[2].innerText="淡水信義線"; lineOpts[3].innerText="松山新店線";
                lineOpts[4].innerText="中和新蘆線"; lineOpts[5].innerText="文湖線"; lineOpts[6].innerText="環狀線";
            }
        }
        updateMapLabels();
        populateDestDropdown();
        refreshStationDisplay();
        calculate();
    }
    function updateMapLabels() {
        let labels = document.querySelectorAll("#mrt-svg .station-label");
        labels.forEach(lbl => {
            let chn = lbl.getAttribute("data-original");
            if(!chn) { chn = lbl.textContent; lbl.setAttribute("data-original", chn); }
            lbl.textContent = getDisp(chn, currentLang);
        });
    }
    function refreshStationDisplay() {
        let startRaw = document.getElementById('start-search').value;
        let destRaw = document.getElementById('dest-search').value;
        document.getElementById('info-start').innerText = startRaw ? getDisp(startRaw, currentLang) : i18n[currentLang].startEmpty;
        document.getElementById('info-dest').innerText = destRaw ? getDisp(destRaw, currentLang) : i18n[currentLang].destEmpty;
        document.getElementById('start-search').placeholder = currentLang==='zh'?"站名 / 點擊地圖":"Station / Click map";
        document.getElementById('dest-search').placeholder = currentLang==='zh'?"站名 / 右鍵地圖":"Station / Right-click map";
        let datalist = document.getElementById('all-stations');
        for(let opt of datalist.options) opt.textContent = getDisp(opt.value, currentLang);
    }
    function populateDestDropdown() {
        let line = document.getElementById('line-select').value;
        let destSelect = document.getElementById('dest-select');
        destSelect.innerHTML = `<option value="" id="dest-placeholder">${i18n[currentLang].destPlaceholder}</option>`;
        if(line && mrtLines[line]){
            mrtLines[line].stations.forEach(s => {
                let opt = document.createElement('option');
                opt.value = s;
                opt.textContent = getDisp(s, currentLang);
                destSelect.appendChild(opt);
            });
        }
        let curDest = document.getElementById('dest-search').value;
        if(curDest && [...destSelect.options].some(o=>o.value===curDest)) destSelect.value = curDest;
    }
    function syncDestFromDropdown() {
        let val = document.getElementById('dest-select').value;
        if(val) { document.getElementById('dest-search').value = val; calculate(); }
    }
    function selectStation(name, type) {
        if(!coords[name]) return;
        if(type==='start') document.getElementById('start-search').value = name;
        else {
            document.getElementById('dest-search').value = name;
            for(let [lineId,line] of Object.entries(mrtLines)){
                if(line.stations.includes(name)){
                    document.getElementById('line-select').value = lineId;
                    populateDestDropdown();
                    break;
                }
            }
        }
        calculate();
    }
    function swapStations() {
        let s = document.getElementById('start-search').value;
        let d = document.getElementById('dest-search').value;
        document.getElementById('start-search').value = d;
        document.getElementById('dest-search').value = s;
        if(s && coords[s]){
            for(let [lineId,line] of Object.entries(mrtLines))
                if(line.stations.includes(s)){ document.getElementById('line-select').value = lineId; break; }
        } else document.getElementById('line-select').value = "";
        populateDestDropdown();
        calculate();
    }
    function calculate() {
        let start = document.getElementById('start-search').value.trim();
        let dest = document.getElementById('dest-search').value.trim();
        let validS = !!coords[start], validD = !!coords[dest];
        refreshStationDisplay();
        if(!validS || !validD || start===dest){
            if(start===dest && start){
                document.getElementById('val-full').innerText = "NT$ 20";
                document.getElementById('val-disc').innerText = "NT$ 8";
                document.getElementById('val-time').innerHTML = "0 <small>min</small>";
                document.getElementById('val-dist').innerText = "0.00";
            } else {
                document.getElementById('val-full').innerText = "--";
                document.getElementById('val-disc').innerText = "--";
                document.getElementById('val-time').innerHTML = "--";
                document.getElementById('val-dist').innerText = "--";
            }
            updateHighlight();
            return;
        }
        let dist = dijkstra(start,dest);
        if(dist===Infinity) { document.getElementById('val-dist').innerText = "error"; return; }
        let fare = calcFare(dist), disc = fare?Math.ceil(fare*0.4):null, time = calcTime(dist);
        document.getElementById('val-dist').innerText = dist.toFixed(2);
        if(fare) document.getElementById('val-full').innerHTML = `NT$ ${fare}`;
        if(disc) document.getElementById('val-disc').innerHTML = `NT$ ${disc}`;
        if(time) document.getElementById('val-time').innerHTML = `${time} <small>min</small>`;
        updateHighlight();
    }
    function updateHighlight() {
        let start = document.getElementById('start-search').value;
        let dest = document.getElementById('dest-search').value;
        document.querySelectorAll('.station-dot').forEach(dot => {
            let name = dot.getAttribute('data-id');
            if(name===start) { dot.setAttribute('fill','#0070BD'); dot.setAttribute('r',3.8); }
            else if(name===dest) { dot.setAttribute('fill','#E3002C'); dot.setAttribute('r',3.8); }
            else { dot.setAttribute('fill','#ffffff'); dot.setAttribute('r',2.5); }
        });
    }
    // 繪製 SVG 地圖
    function initSvg() {
        const svg = document.getElementById('mrt-svg');
        svg.innerHTML = '';
        Object.values(mrtLines).forEach(line => {
            let d = "";
            line.stations.forEach((s,i) => {
                if(coords[s]) {
                    let [x,y] = coords[s];
                    d += (i===0) ? `M ${x} ${y}` : ` L ${x} ${y}`;
                }
            });
            if(d) {
                let path = document.createElementNS("http://www.w3.org/2000/svg","path");
                path.setAttribute("d", d); path.setAttribute("class","route-line"); path.setAttribute("stroke", line.color);
                svg.appendChild(path);
            }
        });
        Object.keys(coords).forEach(name => {
            let [x,y] = coords[name];
            let dot = document.createElementNS("http://www.w3.org/2000/svg","circle");
            dot.setAttribute("cx",x); dot.setAttribute("cy",y); dot.setAttribute("r",2.5);
            dot.setAttribute("fill","#ffffff"); dot.setAttribute("stroke","#4a627a");
            dot.setAttribute("class","station-dot"); dot.setAttribute("data-id",name);
            dot.onclick = (e) => { e.stopPropagation(); selectStation(name,'start'); };
            dot.oncontextmenu = (e) => { e.preventDefault(); e.stopPropagation(); selectStation(name,'dest'); return false; };
            svg.appendChild(dot);
            let text = document.createElementNS("http://www.w3.org/2000/svg","text");
            text.setAttribute("x", x+2.8); text.setAttribute("y", y+2.2);
            text.setAttribute("transform", `rotate(-35, ${x}, ${y})`);
            text.setAttribute("class","station-label");
            text.setAttribute("data-original", name);
            text.textContent = name;
            svg.appendChild(text);
        });
    }
    // 啟動
    window.onload = () => {
        buildGraph();
        initSvg();
        const datalist = document.getElementById('all-stations');
        Object.keys(coords).forEach(s => { let opt = document.createElement('option'); opt.value = s; datalist.appendChild(opt); });
        document.getElementById('start-search').addEventListener('input', calculate);
        document.getElementById('dest-search').addEventListener('input', calculate);
        document.getElementById('swap-btn').addEventListener('click', swapStations);
        document.getElementById('line-select').addEventListener('change', () => { populateDestDropdown(); calculate(); });
        document.getElementById('dest-select').addEventListener('change', syncDestFromDropdown);
        document.getElementById('btn-zh').addEventListener('click', () => { currentLang='zh'; document.querySelector('.lang-btn.active').classList.remove('active'); document.getElementById('btn-zh').classList.add('active'); applyLanguage(); });
        document.getElementById('btn-en').addEventListener('click', () => { currentLang='en'; document.querySelector('.lang-btn.active').classList.remove('active'); document.getElementById('btn-en').classList.add('active'); applyLanguage(); });
        applyLanguage();
        calculate();
    };
</script>
</body>
</html>
